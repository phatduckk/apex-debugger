<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Apex Debugger Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
      min-width: 320px;
    }
    h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #e07820;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #555;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      margin-bottom: 12px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #e07820;
      box-shadow: 0 0 0 2px rgba(224,120,32,0.15);
    }
    button {
      background: #e07820;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #c96a18; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #4caf50;
      min-height: 18px;
    }
    .hint {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
      margin-top: -8px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #e07820;
      cursor: pointer;
      margin: 0;
    }
    .checkbox-row label {
      margin: 0;
      font-weight: 600;
      color: #555;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Apex Debugger Settings</h2>
  <label for="hostname">Apex Hostname</label>
  <input type="text" id="hostname" placeholder="apex.local" spellcheck="false">
  <p class="hint">The hostname or IP address of your Apex controller (e.g. apex.local or 192.168.1.50)</p>
  <div class="checkbox-row">
    <input type="checkbox" id="beefMode">
    <label for="beefMode">Beef Mode</label>
  </div>
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
